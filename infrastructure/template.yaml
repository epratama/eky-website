AWSTemplateFormatVersion: "2010-09-09"
Description: Resume website — S3 + CloudFront hosting with Lambda contact form

Parameters:
  DomainName:
    Type: String
    Default: ""
    Description: Custom domain name (leave empty to use CloudFront URL only)
  CertificateArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN in us-east-1 for the custom domain
  HCaptchaSecret:
    Type: String
    NoEcho: true
    Description: hCaptcha secret key
  HCaptchaSiteKey:
    Type: String
    Description: hCaptcha site key
  RecipientEmail:
    Type: String
    Description: Email address to receive contact form submissions
  SenderEmail:
    Type: String
    Description: SES verified email address for sending
  UpstashRedisUrl:
    Type: String
    Default: ""
    NoEcho: true
    Description: Upstash Redis REST URL
  UpstashRedisToken:
    Type: String
    Default: ""
    NoEcho: true
    Description: Upstash Redis REST token

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref DomainName, ""]]

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: false
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${WebsiteBucket.Arn}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub "${AWS::StackName}-cache"
        MinTTL: 0
        MaxTTL: 31536000
        DefaultTTL: 86400
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  CloudFrontOriginRequestPolicy:
    Type: AWS::CloudFront::OriginRequestPolicy
    Properties:
      OriginRequestPolicyConfig:
        Name: !Sub "${AWS::StackName}-origin-request"
        CookiesConfig:
          CookieBehavior: none
        HeadersConfig:
          HeaderBehavior: none
        QueryStringsConfig:
          QueryStringBehavior: none

  CloudFrontResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${AWS::StackName}-response-headers"
        SecurityHeadersConfig:
          ContentTypeOptions:
            Override: true
          FrameOptions:
            Override: true
            FrameOption: DENY
          ReferrerPolicy:
            Override: true
            ReferrerPolicy: strict-origin-when-cross-origin
          StrictTransportSecurity:
            Override: true
            AccessControlMaxAgeSec: 63072000
            IncludeSubdomains: true
            Preload: true
          XSSProtection:
            Override: true
            ModeBlock: true
            Protection: true

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        Aliases: !If [HasCustomDomain, [!Ref DomainName, !Sub "www.${DomainName}"], !Ref "AWS::NoValue"]
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref CertificateArn
            SslSupportMethod: sni-only
          - CloudFrontDefaultCertificate: true
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          CachePolicyId: !Ref CloudFrontCachePolicy
          OriginRequestPolicyId: !Ref CloudFrontOriginRequestPolicy
          ResponseHeadersPolicyId: !Ref CloudFrontResponseHeadersPolicy
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOriginAccessControl
            S3OriginConfig: {}

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SESAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                Resource: "*"
                Condition:
                  StringEquals:
                    "ses:FromAddress": !Ref SenderEmail

  ContactFormFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-contact-form"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 12
      ReservedConcurrentExecutions: 5
      Environment:
        Variables:
          RECIPIENT_EMAIL: !Ref RecipientEmail
          SENDER_EMAIL: !Ref SenderEmail
          HCAPTCHA_SECRET: !Ref HCaptchaSecret
          ALLOWED_ORIGIN: !If [HasCustomDomain, !Sub "https://${DomainName}", ""]
          DOMAIN_NAME: !Ref DomainName
          ALLOW_CAPTCHA_BYPASS: "false"
          UPSTASH_REDIS_REST_URL: !Ref UpstashRedisUrl
          UPSTASH_REDIS_REST_TOKEN: !Ref UpstashRedisToken
      Code:
        ZipFile: |
          import json, os, re
          from http import HTTPStatus
          from urllib.parse import urlparse
          import urllib.request, urllib.parse
          import boto3

          RECIPIENT_EMAIL = os.environ["RECIPIENT_EMAIL"]
          SENDER_EMAIL = os.environ["SENDER_EMAIL"]
          HCAPTCHA_SECRET = os.environ["HCAPTCHA_SECRET"]
          ALLOWED_ORIGIN = os.environ.get("ALLOWED_ORIGIN", "")
          DOMAIN_NAME = os.environ.get("DOMAIN_NAME", "")
          ALLOW_CAPTCHA_BYPASS = os.environ.get("ALLOW_CAPTCHA_BYPASS", "") == "true"
          HCAPTCHA_VERIFY_URL = "https://hcaptcha.com/siteverify"
          UPSTASH_REDIS_REST_URL = os.environ.get("UPSTASH_REDIS_REST_URL", "")
          UPSTASH_REDIS_REST_TOKEN = os.environ.get("UPSTASH_REDIS_REST_TOKEN", "")
          RATE_MAX = 5
          RATE_WINDOW = 300
          ses = boto3.client("ses")
          EMAIL_RE = re.compile(r"^[^\s@]+@[^\s@]+\.[^\s@]+$")
          PHONE_RE = re.compile(r"^[+]?[\d\s\-().]{6,20}$")

          def _check_origin(headers):
              if not ALLOWED_ORIGIN:
                  return True
              allowed = urlparse(ALLOWED_ORIGIN)
              origin = urlparse((headers or {}).get("origin", ""))
              if not origin.netloc:
                  return False
              allowed_netloc = allowed.netloc.removeprefix("www.")
              origin_netloc = origin.netloc.removeprefix("www.")
              return origin.scheme == allowed.scheme and origin_netloc == allowed_netloc

          def _rate_limit(ip):
              if not UPSTASH_REDIS_REST_URL:
                  return True
              key = f"rate:{ip}"
              try:
                  incr_req = urllib.request.Request(f"{UPSTASH_REDIS_REST_URL}/incr/{key}", method="POST", headers={"Authorization": f"Bearer {UPSTASH_REDIS_REST_TOKEN}"})
                  with urllib.request.urlopen(incr_req, timeout=1) as resp:
                      count = json.loads(resp.read()).get("result", 0)
                  expire_req = urllib.request.Request(f"{UPSTASH_REDIS_REST_URL}/expire/{key}/{RATE_WINDOW}", method="POST", headers={"Authorization": f"Bearer {UPSTASH_REDIS_REST_TOKEN}"})
                  urllib.request.urlopen(expire_req, timeout=1)
                  return count <= RATE_MAX
              except Exception:
                  print("Rate limit check failed")
                  return True

          def handler(event, context):
              headers = {k.lower(): v for k, v in event.get("headers", {}).items()}
              source_ip = (
                  event.get("requestContext", {}).get("http", {}).get("sourceIp")
                  or (headers.get("x-forwarded-for") or "unknown").split(",")[0].strip()
              )

              if not _rate_limit(source_ip):
                  return _error("Too many requests. Please wait.", HTTPStatus.TOO_MANY_REQUESTS)

              if not _check_origin(headers):
                  return _error("Forbidden", HTTPStatus.FORBIDDEN)

              try:
                  body = json.loads(event.get("body", "{}"))
              except json.JSONDecodeError:
                  return _error("Invalid JSON", HTTPStatus.BAD_REQUEST)
              name = (body.get("name") or "").strip()
              email = (body.get("email") or "").strip()
              mobile = (body.get("mobile") or "").strip()
              message = (body.get("message") or "").strip()
              captcha_token = body.get("hcaptcha_token", "")
              if not name:
                  return _error("Name is required", HTTPStatus.BAD_REQUEST)
              if not email or not EMAIL_RE.match(email):
                  return _error("Valid email is required", HTTPStatus.BAD_REQUEST)
              if not message:
                  return _error("Message is required", HTTPStatus.BAD_REQUEST)
              if len(name) > 200:
                  return _error("Name too long", HTTPStatus.BAD_REQUEST)
              if len(email) > 254:
                  return _error("Email too long", HTTPStatus.BAD_REQUEST)
              if len(mobile) > 50:
                  return _error("Mobile too long", HTTPStatus.BAD_REQUEST)
              if mobile and not PHONE_RE.match(mobile):
                  return _error("Invalid mobile", HTTPStatus.BAD_REQUEST)
              if len(message) > 10000:
                  return _error("Message too long", HTTPStatus.BAD_REQUEST)
              name = re.sub(r"[\r\n\t]", " ", name)
              if mobile:
                  mobile = re.sub(r"[\r\n\t]", " ", mobile)
              if not (ALLOW_CAPTCHA_BYPASS and captcha_token == "dev-bypass"):
                  data = urllib.parse.urlencode({"secret": HCAPTCHA_SECRET, "response": captcha_token}).encode()
                  req = urllib.request.Request(HCAPTCHA_VERIFY_URL, data=data, method="POST")
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      if not json.loads(resp.read()).get("success"):
                          return _error("Captcha verification failed", HTTPStatus.BAD_REQUEST)
              mobile_line = f"Mobile: {mobile}" if mobile else "Mobile: not provided"
              subject_domain = DOMAIN_NAME or "contact form"
              from_addr = f"Eky Pratama Portfolio <{SENDER_EMAIL}>"
              html_body = (
                  '<html><body style="font-family:sans-serif;max-width:600px;color:#18181B">'
                  f'<h2 style="border-bottom:3px solid #18181B;padding-bottom:8px">New Message from {_esc(name)}</h2>'
                  f'<p><strong>Name:</strong> {_esc(name)}</p>'
                  f'<p><strong>Email:</strong> {_esc(email)}</p>'
                  f'<p>{_esc(mobile_line)}</p>'
                  f'<hr style="border:1px solid #E4E4E7">'
                  f'<p style="white-space:pre-wrap">{_esc(message)}</p>'
                  f'<hr style="border:1px solid #E4E4E7">'
                  f'<p style="font-size:12px;color:#71717A">Sent via contact form at {_esc(subject_domain)}</p>'
                  '</body></html>'
              )
              text_body = f"Name: {name}\nEmail: {email}\n{mobile_line}\n\n{message}\n\n--\nSent via contact form at {subject_domain}"
              try:
                  ses.send_email(Source=from_addr, Destination={"ToAddresses": [RECIPIENT_EMAIL]}, Message={"Subject": {"Data": f"Portfolio contact from {name} via {subject_domain}"}, "Body": {"Html": {"Data": html_body}, "Text": {"Data": text_body}}})
              except Exception as e:
                  print(f"SES send error: {e}")
                  return _error("Failed to send message", HTTPStatus.INTERNAL_SERVER_ERROR)
              return {"statusCode": HTTPStatus.OK, "headers": _cors_headers(), "body": json.dumps({"success": True})}

          def _error(message, status_code):
              return {"statusCode": status_code, "headers": _cors_headers(), "body": json.dumps({"error": message})}

          def _cors_headers():
              return {"Access-Control-Allow-Origin": ALLOWED_ORIGIN or "*", "Access-Control-Allow-Headers": "Content-Type", "Access-Control-Allow-Methods": "POST, OPTIONS"}

          def _esc(s):
              return s.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;").replace('"', "&quot;").replace("'", "&#x27;")

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${AWS::StackName}-api"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ContactFormFunction.Arn
      PayloadFormatVersion: "2.0"

  HttpApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /"
      Target: !Sub "integrations/${HttpApiIntegration}"

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true

  LambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ContactFormFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/*"

Outputs:
  WebsiteURL:
    Description: CloudFront URL
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution
  LambdaURL:
    Description: Contact form API endpoint
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  S3Bucket:
    Description: S3 bucket for website files
    Value: !Ref WebsiteBucket
