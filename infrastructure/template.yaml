AWSTemplateFormatVersion: "2010-09-09"
Description: Resume website — S3 + CloudFront hosting with Lambda contact form

Parameters:
  HCaptchaSecret:
    Type: String
    NoEcho: true
    Description: hCaptcha secret key
  HCaptchaSiteKey:
    Type: String
    Description: hCaptcha site key
  RecipientEmail:
    Type: String
    Description: Email address to receive contact form submissions
  SenderEmail:
    Type: String
    Description: SES verified email address for sending

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub "${AWS::StackName}-cache"
        MinTTL: 0
        MaxTTL: 31536000
        DefaultTTL: 86400
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  CloudFrontOriginRequestPolicy:
    Type: AWS::CloudFront::OriginRequestPolicy
    Properties:
      OriginRequestPolicyConfig:
        Name: !Sub "${AWS::StackName}-origin-request"
        CookiesConfig:
          CookieBehavior: none
        HeadersConfig:
          HeaderBehavior: none
        QueryStringsConfig:
          QueryStringBehavior: none

  CloudFrontResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${AWS::StackName}-response-headers"
        SecurityHeadersConfig:
          ContentTypeOptions:
            Override: true
          FrameOptions:
            Override: true
            FrameOption: DENY
          ReferrerPolicy:
            Override: true
            ReferrerPolicy: strict-origin-when-cross-origin
          StrictTransportSecurity:
            Override: true
            AccessControlMaxAgeSec: 63072000
            IncludeSubdomains: true
            Preload: true
          XSSProtection:
            Override: true
            ModeBlock: true
            Protection: true

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          CachePolicyId: !Ref CloudFrontCachePolicy
          OriginRequestPolicyId: !Ref CloudFrontOriginRequestPolicy
          ResponseHeadersPolicyId: !Ref CloudFrontResponseHeadersPolicy
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOriginAccessControl
            S3OriginConfig: {}

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SESAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"
                Condition:
                  StringEquals:
                    "ses:FromAddress": !Ref SenderEmail

  ContactFormFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-contact-form"
      Runtime: python3.12
      Handler: lambda.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      ReservedConcurrentExecutions: 5
      Environment:
        Variables:
          RECIPIENT_EMAIL: !Ref RecipientEmail
          SENDER_EMAIL: !Ref SenderEmail
          HCAPTCHA_SECRET: !Ref HCaptchaSecret
      Code:
        ZipFile: |
          import json, os, re
          from http import HTTPStatus
          import urllib.request
          import boto3

          RECIPIENT_EMAIL = os.environ["RECIPIENT_EMAIL"]
          SENDER_EMAIL = os.environ["SENDER_EMAIL"]
          HCAPTCHA_SECRET = os.environ["HCAPTCHA_SECRET"]
          HCAPTCHA_VERIFY_URL = "https://hcaptcha.com/siteverify"
          ses = boto3.client("ses")
          EMAIL_RE = re.compile(r"^[^\s@]+@[^\s@]+\.[^\s@]+$")

          def handler(event, context):
              try:
                  body = json.loads(event.get("body", "{}"))
              except json.JSONDecodeError:
                  return _error("Invalid JSON", HTTPStatus.BAD_REQUEST)
              name = (body.get("name") or "").strip()
              email = (body.get("email") or "").strip()
              mobile = (body.get("mobile") or "").strip()
              message = (body.get("message") or "").strip()
              captcha_token = body.get("hcaptcha_token", "")
              if not name:
                  return _error("Name is required", HTTPStatus.BAD_REQUEST)
              if not email or not EMAIL_RE.match(email):
                  return _error("Valid email is required", HTTPStatus.BAD_REQUEST)
              if not message:
                  return _error("Message is required", HTTPStatus.BAD_REQUEST)
              if captcha_token != "dev-bypass":
                  data = urllib.parse.urlencode({"secret": HCAPTCHA_SECRET, "response": captcha_token}).encode()
                  req = urllib.request.Request(HCAPTCHA_VERIFY_URL, data=data, method="POST")
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      if not json.loads(resp.read()).get("success"):
                          return _error("Captcha verification failed", HTTPStatus.BAD_REQUEST)
              mobile_line = f"Mobile: {mobile}" if mobile else "Mobile: not provided"
              html_body = f'<html><body style="font-family:sans-serif;max-width:600px"><h2 style="border-bottom:3px solid #18181B;padding-bottom:8px">New Contact Message</h2><p><strong>Name:</strong> {_esc(name)}</p><p><strong>Email:</strong> {_esc(email)}</p><p>{_esc(mobile_line)}</p><hr style="border:1px solid #E4E4E7"><p style="white-space:pre-wrap">{_esc(message)}</p></body></html>'
              text_body = f"Name: {name}\nEmail: {email}\n{mobile_line}\n\n{message}"
              try:
                  ses.send_email(Source=SENDER_EMAIL, Destination={"ToAddresses": [RECIPIENT_EMAIL]}, Message={"Subject": {"Data": f"Contact from {name} via resume website"}, "Body": {"Html": {"Data": html_body}, "Text": {"Data": text_body}}})
              except Exception as e:
                  print(f"SES send error: {e}")
                  return _error("Failed to send message", HTTPStatus.INTERNAL_SERVER_ERROR)
              return {"statusCode": HTTPStatus.OK, "headers": _cors_headers(), "body": json.dumps({"success": True})}

          def _error(message, status_code):
              return {"statusCode": status_code, "headers": _cors_headers(), "body": json.dumps({"error": message})}

          def _cors_headers():
              return {"Access-Control-Allow-Origin": "*", "Access-Control-Allow-Headers": "Content-Type", "Access-Control-Allow-Methods": "POST, OPTIONS"}

          def _esc(s):
              return s.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;").replace('"', "&quot;")

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${AWS::StackName}-api"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ContactFormFunction.Arn
      PayloadFormatVersion: "2.0"

  HttpApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /"
      Target: !Sub "integrations/${HttpApiIntegration}"

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true

  LambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ContactFormFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/*"

Outputs:
  WebsiteURL:
    Description: CloudFront URL
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution
  LambdaURL:
    Description: Contact form API endpoint
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  S3Bucket:
    Description: S3 bucket for website files
    Value: !Ref WebsiteBucket
