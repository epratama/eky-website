Diagram:
  DefinitionFiles:
    - Type: URL
      Url: https://raw.githubusercontent.com/awslabs/diagram-as-code/main/definitions/definition-for-aws-icons-light.yaml
  Resources:
    Canvas:
      Type: AWS::Diagram::Canvas
      Direction: vertical
      Children:
        - MainRow
    MainRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - Visitor
        - Browser
        - HCaptcha
        - AWSCloud
        - GoogleWorkspace
    Visitor:
      Type: AWS::Diagram::Resource
      Title: "Visitor"
    Browser:
      Type: AWS::Diagram::Resource
      Title: "Browser"
    HCaptcha:
      Type: AWS::Diagram::Resource
      Title: "hCaptcha"
    GoogleWorkspace:
      Type: AWS::Diagram::Resource
      Title: "Google Workspace"
    AWSCloud:
      Type: AWS::Diagram::Cloud
      Preset: AWSCloudNoLogo
      Direction: vertical
      Children:
        - CDNLayer
        - Spacer1
        - BackendLayer
    Spacer1:
      Type: AWS::Diagram::Resource
    CDNLayer:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - Route53
        - CloudFrontDist
        - S3
    Route53:
      Type: AWS::Route53::HostedZone
      Preset: Route53HostedZone
      Title: "Hosted zone\nSPF · DKIM · DMARC\nMAIL FROM · ALIAS A"
    CloudFrontDist:
      Type: AWS::CloudFront::Distribution
      Preset: CloudFrontDistribution
      Direction: vertical
      Children:
        - ACMCertificate
        - ResponseHeadersPolicy
    ACMCertificate:
      Type: AWS::CertificateManager::Certificate
      Preset: CertificateManager
    ResponseHeadersPolicy:
      Type: AWS::Diagram::Resource
      Title: "HSTS · XFO DENY · XCTO · RP · XSS"
    S3:
      Type: AWS::S3::Bucket
      Preset: S3Bucket
    BackendLayer:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - ApiGateway
        - LambdaFunction
        - SimpleEmailService
    ApiGateway:
      Type: AWS::ApiGateway::RestApi
      Preset: ApiGatewayRestApi
    LambdaFunction:
      Type: AWS::Lambda::Function
      Preset: LambdaFunction
      Title: "Lambda\nRate limit 3/min/IP\nOrigin check\nValidation"
      Children:
        - LambdaRole
    LambdaRole:
      Type: AWS::IAM::Role
      Preset: IAMRole
    SimpleEmailService:
      Type: AWS::SES::Email
      Preset: SimpleEmailServiceEmail
  Links:
    - Source: Visitor
      Target: Browser
      SourcePosition: E
      TargetPosition: W
    - Source: Browser
      Target: Route53
      SourcePosition: E
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Type: orthogonal
      Labels:
        TargetLeft:
          Title: "DNS"
    - Source: Browser
      Target: CloudFrontDist
      SourcePosition: E
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Type: orthogonal
      Labels:
        TargetLeft:
          Title: "HTTPS"
    - Source: Browser
      Target: HCaptcha
      SourcePosition: E
      TargetPosition: W
      Type: orthogonal
    - Source: HCaptcha
      Target: Browser
      SourcePosition: W
      TargetPosition: E
      TargetArrowHead:
        Type: Open
      Type: orthogonal
      Labels:
        TargetLeft:
          Title: "token"
    - Source: Browser
      Target: ApiGateway
      SourcePosition: E
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Type: orthogonal
      Labels:
        TargetLeft:
          Title: "POST"
    - Source: ApiGateway
      Target: LambdaFunction
      SourcePosition: E
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Type: orthogonal
      Labels:
        TargetLeft:
          Title: "AWS_PROXY"
    - Source: LambdaFunction
      SourcePosition: S
      Target: LambdaRole
      TargetPosition: N
      Type: orthogonal
      Labels:
        TargetLeft:
          Title: "IAM Role · ses:SendEmail"
    - Source: LambdaFunction
      Target: SimpleEmailService
      SourcePosition: E
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Type: orthogonal
    - Source: CloudFrontDist
      SourcePosition: S
      Target: S3
      TargetPosition: N
      TargetArrowHead:
        Type: Open
      Type: orthogonal
      Labels:
        TargetLeft:
          Title: "OAC (sigv4)"
    - Source: CloudFrontDist
      SourcePosition: E
      Target: ACMCertificate
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Type: orthogonal
      Labels:
        TargetLeft:
          Title: "TLS"
    - Source: SimpleEmailService
      Target: GoogleWorkspace
      SourcePosition: E
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Type: orthogonal
      Labels:
        TargetLeft:
          Title: "email"