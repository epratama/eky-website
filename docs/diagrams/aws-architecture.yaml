Diagram:
  DefinitionFiles:
    - Type: URL
      Url: https://raw.githubusercontent.com/awslabs/diagram-as-code/main/definitions/definition-for-aws-icons-light.yaml
  Resources:
    Canvas:
      Type: AWS::Diagram::Canvas
      Direction: vertical
      Children:
        - MainRow
    MainRow:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - ExternalStack
        - AWSCloud
    ExternalStack:
      Type: AWS::Diagram::VerticalStack
      Children:
        - Browser
        - HCaptcha
        - UpstashRedis
    Browser:
      Type: AWS::Diagram::Resource
      Title: "Browser"
    HCaptcha:
      Type: AWS::Diagram::Resource
      Title: "hCaptcha"
    UpstashRedis:
      Type: AWS::Diagram::Resource
      Title: "Upstash Redis"
    AWSCloud:
      Type: AWS::Diagram::Cloud
      Preset: AWSCloudNoLogo
      Direction: vertical
      Children:
        - CDNLayer
        - Spacer1
        - BackendLayer
    Spacer1:
      Type: AWS::Diagram::Resource
    CDNLayer:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - Route53
        - CloudFrontDist
        - S3
    Route53:
      Type: AWS::Route53::HostedZone
      Preset: Route53HostedZone
      Title: "Hosted zone"
    CloudFrontDist:
      Type: AWS::CloudFront::Distribution
      Preset: CloudFrontDistribution
      Direction: vertical
      Children:
        - ACMCertificate
        - ResponseHeadersPolicy
    ACMCertificate:
      Type: AWS::CertificateManager::Certificate
      Preset: CertificateManager
    ResponseHeadersPolicy:
      Type: AWS::Diagram::Resource
    S3:
      Type: AWS::S3::Bucket
      Preset: S3Bucket
    BackendLayer:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - ApiGateway
        - LambdaFunction
        - SimpleEmailService
    ApiGateway:
      Type: AWS::ApiGateway::RestApi
      Preset: ApiGatewayRestApi
    LambdaFunction:
      Type: AWS::Lambda::Function
      Preset: LambdaFunction
      Title: "Lambda"
      Children:
        - LambdaRole
    LambdaRole:
      Type: AWS::IAM::Role
      Preset: IAMRole
    SimpleEmailService:
      Type: AWS::SES::Email
      Preset: SimpleEmailServiceEmail
  Links:
    - Source: Browser
      Target: Route53
      SourcePosition: E
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Type: orthogonal
      Labels:
        TargetLeft:
          Title: "DNS"
    - Source: Browser
      Target: CloudFrontDist
      SourcePosition: E
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Type: orthogonal
      Labels:
        TargetRight:
          Title: "HTTPS"
    - Source: Browser
      Target: ApiGateway
      SourcePosition: E
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Type: orthogonal
      Labels:
        TargetLeft:
          Title: "POST"
    - Source: ApiGateway
      Target: LambdaFunction
      SourcePosition: E
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Type: orthogonal
      Labels:
        TargetLeft:
          Title: "proxy"
    - Source: LambdaFunction
      SourcePosition: S
      Target: LambdaRole
      TargetPosition: N
      Type: orthogonal
      Labels:
        TargetLeft:
          Title: "ses:SendEmail"
    - Source: LambdaFunction
      Target: SimpleEmailService
      SourcePosition: E
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Type: orthogonal
    - Source: LambdaFunction
      Target: UpstashRedis
      SourcePosition: E
      TargetPosition: W
      TargetArrowHead:
        Type: Open
      Type: orthogonal
      Labels:
        TargetLeft:
          Title: "REST"
    - Source: CloudFrontDist
      SourcePosition: SE
      Target: S3
      TargetPosition: NW
      TargetArrowHead:
        Type: Open
      Type: orthogonal
      Labels:
        TargetRight:
          Title: "OAC"